# A minimal valid AgenticApplication: one model, one agent, no tools,
# structured output. See README.md and Example 1 in temp/instruction.md §28.
apiVersion: agentform.dev/v1alpha1
kind: AgenticApplication

metadata:
  name: basic-assistant
  version: 1.0.0
  description: A minimal single-agent assistant with no tools.

spec:
  runtime:
    target: openai
    environment: development

  models:
    primary:
      provider: openai
      model: gpt-5
      temperature: 0
      responseFormat:
        schemaRef: schemas/answer.json

  agents:
    assistant:
      model: primary
      role: assistant
      instructions:
        text: You are a helpful, concise assistant. Answer only from what the user provides.
      limits:
        maxSteps: 4
        timeout: 15s
        maxCostUsd: 0.05

  workflows:
    main:
      entrypoint: assistant
      nodes:
        assistant:
          type: agent
          agent: assistant

  observability:
    tracing:
      provider: opentelemetry
    recordPrompts: false
    recordToolCalls: true
