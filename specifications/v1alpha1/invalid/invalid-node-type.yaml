# Defect: the workflow node's `type` is not one of the 13 known node types.
apiVersion: agentform.dev/v1alpha1
kind: AgenticApplication

metadata:
  name: fixture-app
  version: 1.0.0

spec:
  runtime:
    target: openai
    environment: development
  models:
    primary:
      provider: openai
      model: gpt-5
  agents:
    assistant:
      model: primary
      role: assistant
      instructions:
        text: You are a helpful assistant.
  workflows:
    main:
      entrypoint: assistant
      nodes:
        assistant:
          type: teleport
          agent: assistant
